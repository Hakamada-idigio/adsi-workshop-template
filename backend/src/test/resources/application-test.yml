spring:
  datasource:
    url: jdbc:h2:mem:attendance_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: test-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm
  expiration-ms: 28800000
