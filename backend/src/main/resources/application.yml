spring:
  application:
    name: attendance
  datasource:
    url: jdbc:postgresql://localhost:5432/attendance
    username: ${DATABASE_USERNAME:attendance}
    password: ${DATABASE_PASSWORD:attendance}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 28800000
